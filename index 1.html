<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }

        .container {
            width: 350px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>BMI Calculator</h1>

    <label>Weight (kg):</label><br>
    <input type="number" id="weight" placeholder="Enter weight"><br>

    <label>Height (cm):</label><br>
    <input type="number" id="height" placeholder="Enter height"><br>

    <button onclick="calculateBMI()">Calculate</button>

    <div class="result" id="output"></div>
</div>

<script>
function calculateBMI() {
    let weight = document.getElementById("weight").value;
    let height = document.getElementById("height").value;

    if (weight === "" || height === "") {
        document.getElementById("output").innerHTML = "Please enter all values!";
        return;
    }

    height = height / 100; // convert cm to meter
    let bmi = weight / (height * height);
    bmi = bmi.toFixed(2);

    let status = "";

    if (bmi < 18.5) {
        status = "Underweight";
    } else if (bmi >= 18.5 && bmi < 24.9) {
        status = "Normal weight";
    } else if (bmi >= 25 && bmi < 29.9) {
        status = "Overweight";
    } else {
        status = "Obese";
    }

    document.getElementById("output").innerHTML =
        "Your BMI: " + bmi + "<br>Status: " + status;
}
</script>

</body>
</html>
